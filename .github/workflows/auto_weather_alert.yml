name: Update Auto Weather Alert

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python scripts/auto_weather_alert.py

      - name: Commit changes
        run: |
          if git diff --quiet alert.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "LOOHP"
          git config user.email "jamesloohp@gmail.com"
          git add alert.json
          git commit -m "Auto Weather Alert"
          git push